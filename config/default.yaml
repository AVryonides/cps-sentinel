project:
  name: CPS Sentinel
  random_seed: 42

simulation:
  start_time: "2026-01-01T00:00:00+00:00"
  duration_hours: 24
  timestep_minutes: 5
  profiles:
    pv_peak_kw: 6.0
    pv_variability_fraction: 0.08
    load_base_kw: 1.4
    load_morning_peak_kw: 1.3
    load_evening_peak_kw: 2.4
    load_noise_std_kw: 0.10
  battery:
    capacity_kwh: 10.0
    initial_soc: 0.50
    minimum_soc: 0.10
    maximum_soc: 0.90
    maximum_power_kw: 5.0
    charge_efficiency: 0.95
    discharge_efficiency: 0.95

detection:
  robust_z_threshold: 3.5
  calibration_quantile: 0.995
  physics_min_votes: 1
  ml_score_percentile: 0.995
  persistence_window: 3
  persistence_votes: 2
  isolation_estimators: 200

risk:
  confidence_weight: 0.30
  impact_weight: 0.40
  duration_weight: 0.15
  safety_proximity_weight: 0.15
  grid_impact_reference_kw: 5.0
  soc_divergence_reference: 0.20
  duration_reference_steps: 36
  medium_threshold: 30.0
  high_threshold: 55.0
  critical_threshold: 80.0

health:
  rated_capacity_ah: 2.0
  end_of_life_capacity_ah: 1.4
  warning_soh_fraction: 0.80
  critical_soh_fraction: 0.70
  minimum_regression_cycles: 20
  regression_window_cycles: 60

swat:
  training_fraction: 0.80
  score_quantile: 0.95
  isolation_estimators: 200
  max_training_rows: 100000
  persistence_window: 5
  persistence_votes: 2
  event_gap_steps: 120
  top_contributors: 5
